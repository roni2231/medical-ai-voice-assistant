# Medical AI Voice Assistant -- runtime configuration
# Switch active_profile below, or override with: ENV=prod python voice_assistant.py
#
# TTS backend install:
#   local (M4/Metal):  CMAKE_ARGS="-DGGML_METAL=on" pip install orpheus-cpp llama-cpp-python --no-binary llama-cpp-python
#   prod  (RTX/CUDA):  pip install orpheus-speech

active_profile: local

profiles:
  local:
    # MacBook Air M4 -- orpheus-cpp (Metal/llama.cpp), Ollama LLM
    ollama:
      host: http://localhost:11434
      model: qwen3.5:2b
    tts:
      backend: cpp                                          # orpheus-cpp (Metal)
      model_name: canopylabs/orpheus-3b-0.1-finetune-prod  # vllm backend only
      voice: tara
    audio:
      output_path: /tmp/response.wav

  prod:
    # NVIDIA RTX 5070 -- orpheus-speech (vllm/CUDA), Ollama LLM
    ollama:
      host: http://localhost:11434
      model: medllama2:7b
    tts:
      backend: vllm                                         # orpheus-speech (vllm)
      model_name: canopylabs/orpheus-3b-0.1-finetune-prod
      voice: tara
    audio:
      output_path: /tmp/response.wav

assistant:
  system_prompt: >
    You are a compassionate, firm medical assistant.
    Be empathetic but direct.
    If symptoms sound serious, advise seeing a doctor immediately.

# Medical AI Voice Assistant — runtime configuration
# Switch this file (or use a separate config.prod.yaml) between local and prod.
# Active profile is set by the ENV environment variable (default: local).

active_profile: local

profiles:
  local:
    # MacBook Air M4 — Ollama + Orpheus TTS running locally
    ollama:
      host: http://localhost:11434
      model: medllama2:7b
    tts:
      ws_url: ws://localhost:5005
      voice: tara
    audio:
      output_path: /tmp/response.wav

  prod:
    # NVIDIA RTX 5070 — SSH'd in, same stack, different host/model config
    ollama:
      host: http://localhost:11434
      model: medllama2:7b
    tts:
      ws_url: ws://localhost:5005
      voice: tara
    audio:
      output_path: /tmp/response.wav

assistant:
  system_prompt: >
    You are a compassionate, firm medical assistant.
    Be empathetic but direct.
    If symptoms sound serious, advise seeing a doctor immediately.
